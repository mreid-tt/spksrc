[icingaweb_db]
type = "db"
db = "mysql"
host = "localhost"
port = "3306"
dbname = "@db_name@"
username = "@db_user@"
password = "@db_pass@"
charset = "utf8mb4"
use_ssl = "0"

[icinga_ido]
type = "db"
db = "mysql"
host = "localhost"
port = "3306"
dbname = "@ido_db_name@"
username = "@ido_db_user@"
password = "@ido_db_pass@"
charset = "utf8mb4"
use_ssl = "0"

[icinga_api]
type = "icinga"
host = "@api_host@"
port = "5665"
username = "@api_user@"
password = "@api_pass@"
use_ssl = "1"
